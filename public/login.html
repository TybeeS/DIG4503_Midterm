<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In - PollView</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-brand">
      <a href="index.html">PollView</a>
    </div>
    <div class="nav-links">
      <a href="my-polls.html">My Polls</a>
    </div>
    <div class="nav-auth">
      <span id="nav-user-email" class="nav-user-email"></span>
      <button id="nav-logout-btn" class="btn btn-outline btn-sm" style="display:none">Log Out</button>
      <a id="nav-login-link" href="login.html" class="btn btn-primary btn-sm">Log In</a>
    </div>
    <button class="mobile-menu-btn" aria-label="Toggle menu" aria-expanded="false">&#9776;</button>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <h1>Welcome back!</h1>
      <p class="auth-subtitle">Log in to your PollView account</p>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Your password" required autocomplete="current-password">
        </div>
        <p class="auth-error" id="error-msg" role="alert"></p>
        <button type="submit" class="btn btn-primary btn-lg" id="submit-btn">Log In</button>
      </form>

      <p class="auth-switch">
        Don't have an account? <a href="register.html">Sign up</a>
      </p>
    </div>
  </div>

  <script src="nav.js"></script>
  <script type="module">
    import { auth } from './firebase-init.js';
    import { signInWithEmailAndPassword, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

    // Redirect already-logged-in users
    onAuthStateChanged(auth, user => {
      if (user) window.location.href = 'index.html';
    });

    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl  = document.getElementById('error-msg');
      const submitBtn = document.getElementById('submit-btn');

      errorEl.textContent = '';
      submitBtn.disabled  = true;
      submitBtn.textContent = 'Logging in…';

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = 'index.html';
      } catch (err) {
        errorEl.textContent = friendlyError(err.code);
        submitBtn.disabled  = false;
        submitBtn.textContent = 'Log In';
      }
    });

    function friendlyError(code) {
      switch (code) {
        case 'auth/invalid-email':         return 'Please enter a valid email address.';
        case 'auth/user-not-found':
        case 'auth/wrong-password':
        case 'auth/invalid-credential':    return 'Incorrect email or password.';
        case 'auth/too-many-requests':     return 'Too many attempts. Please try again later.';
        default:                           return 'Something went wrong. Please try again.';
      }
    }
  </script>
</body>
</html>
